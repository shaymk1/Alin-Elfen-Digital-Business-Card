
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Business Card</title>
<style>
  body, html { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh;}
  .card {
    background: #111; /* brand color */
    color: #fff;
    border-radius: 15px;
    padding: 30px;
    max-width: 350px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  .card img { width: 80px; border-radius: 50%; margin-bottom: 15px;}
  h2 { margin: 10px 0; }
  p { margin: 5px 0; font-size: 14px; }
  a { color: #00ffff; text-decoration: none; display: block; margin: 5px 0; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <img src="profile.jpg" alt="Profile Photo">
  <h2>John Doe</h2>
  <p>CEO, Company Name</p>
  <a href="mailto:john@company.com">john@company.com</a>
  <a href="tel:+27123456789">+27 123 456 789</a>
  <a href="https://company.com" target="_blank">company.com</a>
</div>

</body>
</html>
